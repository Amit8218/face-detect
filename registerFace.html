<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Registration & Recognition</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }
    
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
      color: var(--text-main);
      overflow-x: hidden;
    }

    /* Ambient background shapes */
    .bg-shape {
      position: absolute;
      filter: blur(100px);
      z-index: -1;
      opacity: 0.5;
    }
    .shape1 { top: -10%; left: -10%; width: 400px; height: 400px; background: #4338ca; border-radius: 50%; }
    .shape2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #312e81; border-radius: 50%; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 900px;
      margin-bottom: 30px;
      padding: 0 20px;
      box-sizing: border-box;
      z-index: 10;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(to right, #a5b4fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
    }

    .view-link {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-main);
      padding: 10px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .view-link:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }

    .main-content {
      display: flex;
      gap: 30px;
      max-width: 1200px;
      width: 100%;
      padding: 0 20px;
      box-sizing: border-box;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      z-index: 10;
    }

    .video-wrapper {
      position: relative;
      padding: 5px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .video-container {
      width: 720px;
      height: 540px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background: #000;
      max-width: 100%;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      transform: scaleX(-1);
    }

    .info-box {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 15px 20px;
      border-radius: 12px;
      font-size: 13px;
      min-width: 200px;
      z-index: 10;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
    }

    .info-box div {
      margin: 8px 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 4px;
    }
    .info-box div:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .label {
      color: var(--text-muted);
      font-weight: 500;
    }

    .value-highlight {
      color: var(--success);
      font-weight: 600;
      text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
    }

    .controls-panel {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 24px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 14px 16px;
      font-size: 16px;
      color: white;
      border-radius: 12px;
      outline: none;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    button {
      padding: 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px -10px var(--primary);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -10px var(--primary);
      background: linear-gradient(135deg, #818cf8, var(--primary));
    }

    button:active {
      transform: translateY(1px);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 10px;
    }

    .stat {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 16px;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .stat:hover {
      background: rgba(15, 23, 42, 0.6);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: white;
    }

    #status {
      margin-top: 5px;
      padding: 12px;
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      background: rgba(15, 23, 42, 0.4);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    @media (max-width: 1100px) {
      .main-content {
        flex-direction: column;
        align-items: center;
      }
      .controls-panel {
        width: 100%;
        max-width: 720px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <div class="header">
    <h1>FaceNet Registration</h1>
    <a href="viewFaces.html" class="view-link">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
      View Database
    </a>
  </div>
  
  <div class="main-content">
    <div class="video-wrapper">
      <div class="video-container">
        <video id="video" width="720" height="540" autoplay muted></video>
        <div class="info-box" id="info-box">
          <div><span class="label">Status</span> <span id="detection-status" class="value-highlight">Initializing...</span></div>
          <div><span class="label">Confidence</span> <span id="confidence" style="color: white;">-</span></div>
          <div><span class="label">Expression</span> <span id="expression" style="color: white;">-</span></div>
          <div><span class="label">Recognized</span> <span id="recognized" class="value-highlight">-</span></div>
        </div>
      </div>
    </div>
    
    <div class="controls-panel">
      <div class="input-group">
        <label for="student-id">Student Identity</label>
        <input type="text" id="student-id" placeholder="e.g. STU-2023-001" autocomplete="off" />
      </div>
      
      <button onclick="registerPerson()">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        Capture & Register
      </button>
      
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Faces Detected</div>
          <div class="stat-value" id="faces-detected">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Database Size</div>
          <div class="stat-value" id="registered-count">0</div>
        </div>
      </div>

      <div id="status">Loading AI models...</div>
    </div>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="registerFace.js"></script>
</body>
</html>
